
spring.application.name=alura


spring.datasource.url=jdbc:mysql://localhost:3306/banco_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=alura
spring.datasource.password=alura
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# para mostrar las consultas en sql en consola xd
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect